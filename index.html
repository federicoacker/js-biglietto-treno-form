<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Biglietto-Treno-Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style/index.css" rel="stylesheet">
</head>

<body class="bg-danger text-white">
    <main>
        <div class="outer-wrapper container-lg d-flex flex-column justify-content-center">
            <div class="form-wrapper row justify-content-center align-items-center" id="form-wrapper">
                <h1 class="text-center">Crea il tuo biglietto</h1>
                <div class="col-12 col-lg-6">
                    <form action="" id="ticket-form" class="form-control">
                        <div class="my-1">
                            <label for="user-form-name" class="form-label">Nome</label>
                            <input required class="form-control" type="text" id="user-form-name"
                                placeholder="Inserisci il tuo Nome">
                        </div>
                        <div class="my-1">
                            <label for="user-form-surname" class="form-label">Cognome</label>
                            <input required class="form-control" type="text" id="user-form-surname"
                                placeholder="Inserisci il tuo Cognome">
                        </div>
                        <div class="my-1">
                            <label for="user-form-kilometers" class="form-label">Chilometri</label>
                            <input required class="form-control" type="number" id="user-form-kilometers"
                                placeholder="Inserisci quanti chilometri vuoi viaggiare">
                        </div>
                        <div class="my-1">
                            <label for="user-form-age-category" class="form-label">Seleziona la tua fascia d'età</label>
                            <select id="user-form-age-category" class="form-control">
                                <option value="0">Minorenne (Meno di 18 anni)</option>
                                <option value="1">Maggiorenne (Tra i 18 anni e i 65)</option>
                                <option value="2">Senior (Almeno 65 anni compiuti)</option>
                            </select>
                        </div>
                        <div class="my-3">
                            <button type="submit" class="btn btn-danger d-block mx-auto w-50">Genera il tuo
                                biglietto</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="ticket-wrapper container-lg border g-0 bg-dark rounded border-secondary-subtle border-2 d-none" id="ticket-wrapper">
                <div class="row g-0">
                    <div class="col-6 col-md-4 border-end d-flex align-items-center px-3 border-secondary-subtle ">
                        <img src="./img/logo.png" alt="Logo di trenitalia" class="img-fluid rounded">
                    </div>
                    <div class="col-6 col-md-8">
                        <div class="container-fluid h-100 text-white">
                            <div class="row py-5 justify-content-center border-bottom border-secondary-subtle ">
                                <div class="col-4">
                                    <h5 class="text-center fw-bold">Nominativo </h5>
                                    <p class="text-center fw-bold" id="nome-p">placeholder</p>
                                </div>
                            </div>
                            <div class="row py-5 align-items-center row-gap-5">
                                <div class="col-6 col-md-3">
                                    <h5 class="text-center fw-bold">Offerta </h5>
                                    <p class="text-center fw-bold" id="offerta-p">placeholder</p>
                                </div>
                                <div class="col-6 col-md-3">
                                    <h5 class="text-center fw-bold">Carrozza </h5>
                                    <p class="text-center fw-bold" id="carrozza-p">placeholder</p>
                                </div>
                                <div class="col-6 col-md-3">
                                    <h5 class="text-center fw-bold">Codice CP </h5>
                                    <p class="text-center fw-bold" id="codice-p">placeholder</p>
                                </div>
                                <div class="col-6 col-md-3">
                                    <h5 class="text-center fw-bold">Costo Biglietto </h5>
                                    <p class="text-center fw-bold" id="costo-p">placeholder</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button id="new-ticket-btn" class="my-1 btn btn-dark d-none py-4 fw-bold border border-2 border-secondary-subtle">Genera un nuovo biglietto</button>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/functions.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
